<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WGANG Portal – Project Rooster medlemsoversikt.">
  <title>WGANG Portal | Medlemmer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#top">
      <span class="logo">W</span>
      <span><strong>WGANG</strong><small>PROJECT ROOSTER</small></span>
    </a>
    <button class="mode-button" id="modeButton">Vis som admin</button>
  </header>

  <main id="top">
    <section class="hero">
      <p class="eyebrow">Modul 2 · prototype</p>
      <h1>Medlemsoversikt</h1>
      <p>Alle svar og statuser vises med det godkjente spillnavnet i Hay Day.</p>
    </section>

    <section class="summary-grid">
      <article><strong>8</strong><span>medlemmer i demo</span></article>
      <article><strong>5</strong><span>bekreftet derby</span></article>
      <article><strong>2</strong><span>tar pause</span></article>
      <article><strong>1</strong><span>mangler svar</span></article>
    </section>

    <section class="controls">
      <label>
        <span>Søk etter spillnavn</span>
        <input id="searchInput" type="search" placeholder="For eksempel SANDER">
      </label>
      <label>
        <span>Derbystatus</span>
        <select id="statusFilter">
          <option value="all">Alle</option>
          <option value="joined">Deltar</option>
          <option value="pause">Tar pause</option>
          <option value="waiting">Mangler svar</option>
          <option value="finished">Ferdig</option>
        </select>
      </label>
      <label>
        <span>Rolle</span>
        <select id="roleFilter">
          <option value="all">Alle roller</option>
          <option value="leader">Leder</option>
          <option value="coleader">Ass. leder</option>
          <option value="member">Medlem</option>
        </select>
      </label>
    </section>

    <section class="member-grid" id="memberGrid"></section>

    <section class="empty-state" id="emptyState" hidden>
      Ingen medlemmer samsvarer med filtrene.
    </section>
  </main>

  <dialog id="memberDialog">
    <div class="dialog-head">
      <div>
        <p class="eyebrow">Medlemsprofil</p>
        <h2 id="dialogName"></h2>
      </div>
      <button id="closeDialog" aria-label="Lukk">×</button>
    </div>
    <div id="dialogContent"></div>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
